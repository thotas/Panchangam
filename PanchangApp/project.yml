name: PanchangApp
options:
  bundleIdPrefix: com.panchang
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  PanchangApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/PanchangApp
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panchang.app
        INFOPLIST_FILE: Sources/PanchangApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PanchangApp/PanchangApp.entitlements
        PRODUCT_NAME: PanchangApp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: "YES"
        OTHER_LDFLAGS:
          - "-lpanchang_engine_universal"
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/panchang_engine"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/panchang_engine/include"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: Foundation.framework
      - sdk: AppKit.framework
    preBuildScripts: []
    postBuildScripts: []
    preCompileScripts: []
    postCompileScripts: []
    info:
      path: Sources/PanchangApp/Info.plist
      properties:
        CFBundleName: PanchangApp
        CFBundleDisplayName: PanchangApp
        CFBundleIdentifier: com.panchang.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: PanchangApp
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.utilities

schemes:
  PanchangApp:
    build:
      targets:
        PanchangApp: all
    run:
      config: Debug
    archive:
      config: Release
